events {
    worker_connections 10000; 
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Docker's embedded DNS server. Using variables in proxy_pass makes nginx
    # re-resolve service names instead of pinning container IPs at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_origin $cors_origin {
        default $http_origin;
        '' '*';
    }

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    server {
        listen 80;

        set $event_service http://event-service:4000;
        set $player_service http://player-service:3000;
        set $matchmaking_service http://matchmaking-service:3001;
        set $game_logic_service http://game-logic-service:3003;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Standard Headers for distributed systems
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Gateway)
        location /ws {
            proxy_pass $event_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Disable buffering for real-time moves
            proxy_buffering off;
        }

        # Player Service REST API
        location /api/player/ {
            rewrite ^/api/player/?(.*)$ /player/$1 break;
            proxy_pass $player_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = /api/player {
            proxy_pass $player_service/player;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/auth/ {
            rewrite ^/api/auth/?(.*)$ /auth/$1 break;
            proxy_pass $player_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = /api/auth {
            proxy_pass $player_service/auth;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Matchmaking REST API
        location /api/matchmaking/ {
            rewrite ^/api/matchmaking/?(.*)$ /$1 break;
            proxy_pass $matchmaking_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = /api/matchmaking {
            proxy_pass $matchmaking_service/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Game Logic History API
        location /api/history/ {
            rewrite ^/api/history/?(.*)$ /$1 break;
            proxy_pass $game_logic_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location = /api/history {
            proxy_pass $game_logic_service/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
